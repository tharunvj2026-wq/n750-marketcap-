name: Daily COIL Scan

on:
  schedule:
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install nselib pandas numpy scipy requests python-dateutil
        
    - name: Run COIL Analysis
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
      run: |
        python cell2_build_db.py
        python cell3_coil_analysis.py
        
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: coil-results
        path: |
          coil_analysis_results.csv
          nifty750_bhavcopy_cache.csv