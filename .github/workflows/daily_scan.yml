# ============================================
# COMPLETE DAILY SCAN - RUN ALL ANALYSES
# Runs: Coil, Sweep Daily, Sweep Weekly, SMC Daily
# Each analysis sends its own Telegram alert
# ============================================

import os
import sys
import time
from datetime import datetime

def print_header(title):
    print("\n" + "=" * 70)
    print(f"  {title}")
    print("=" * 70)

def run_analysis(module_name, description):
    """Run a single analysis module"""
    print_header(f"RUNNING: {description}")
    start_time = time.time()
    
    try:
        # Import and run the module
        if module_name == "cell2_build_db":
            from cell2_build_db import build_database_cache
            result = build_database_cache()
            success = result is not None
            
        elif module_name == "cell3_coil_analysis":
            from cell3_coil_analysis import main as run_coil
            run_coil()
            success = True
            
        elif module_name == "cell4_sweep_daily":
            from cell4_sweep_daily import main as run_sweep_daily
            run_sweep_daily()
            success = True
            
        elif module_name == "cell5_sweep_weekly":
            from cell5_sweep_weekly import main as run_sweep_weekly
            run_sweep_weekly()
            success = True
            
        elif module_name == "cell6_smc_daily":
            from cell6_smc_daily import main as run_smc_daily
            run_smc_daily()
            success = True
            
        else:
            print(f"❌ Unknown module: {module_name}")
            success = False
        
        elapsed = time.time() - start_time
        if success:
            print(f"\n✅ {description} completed in {elapsed:.1f} seconds")
        else:
            print(f"\n⚠️ {description} had issues")
            
        return success
        
    except ImportError as e:
        print(f"❌ Module not found: {module_name}")
        print(f"   Error: {e}")
        return False
    except Exception as e:
        print(f"❌ Error running {description}: {e}")
        return False

def check_dependencies():
    """Check if all required files exist"""
    required_files = [
        "cell1_marketcap.py",
        "cell2_build_db.py", 
        "cell3_coil_analysis.py",
        "cell4_sweep_daily.py",
        "cell5_sweep_weekly.py",
        "cell6_smc_daily.py"
    ]
    
    missing = []
    for file in required_files:
        if not os.path.exists(file):
            missing.append(file)
    
    if missing:
        print("❌ Missing required files:")
        for m in missing:
            print(f"   - {m}")
        return False
    return True

def main():
    print("=" * 70)
    print("  COMPLETE DAILY MARKET SCAN")
    print(f"  Time: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
    print("=" * 70)
    
    # Check if it's a trading day (simple weekday check)
    if datetime.now().weekday() >= 5:
        print("\n⏸️ Weekend. Skipping scan (Mon-Fri only)")
        return
    
    # Check dependencies
    if not check_dependencies():
        print("\n❌ Cannot proceed. Missing required files.")
        return
    
    # Track results
    results = {}
    
    # ============================================
    # STEP 1: Build/Update Database
    # ============================================
    results['Database'] = run_analysis("cell2_build_db", "Building/Updating Database")
    
    if not results['Database']:
        print("\n❌ Database build failed. Stopping scan.")
        return
    
    # ============================================
    # STEP 2: Coil Analysis
    # ============================================
    results['Coil Analysis'] = run_analysis("cell3_coil_analysis", "Coil Analysis (Accumulation)")
    
    # ============================================
    # STEP 3: Daily Sweep Candle
    # ============================================
    results['Daily Sweep'] = run_analysis("cell4_sweep_daily", "Daily Sweep Candle Scanner")
    
    # ============================================
    # STEP 4: Weekly Sweep Candle
    # ============================================
    results['Weekly Sweep'] = run_analysis("cell5_sweep_weekly", "Weekly Sweep Candle Scanner")
    
    # ============================================
    # STEP 5: Daily SMC
    # ============================================
    results['Daily SMC'] = run_analysis("cell6_smc_daily", "Daily SMC Scanner (35% Discount)")
    
    # ============================================
    # SUMMARY
    # ============================================
    print_header("SCAN SUMMARY")
    
    success_count = sum(1 for v in results.values() if v)
    total_count = len(results)
    
    for name, status in results.items():
        status_str = "✅ PASS" if status else "❌ FAIL"
        print(f"   {status_str}  {name}")
    
    print("-" * 70)
    print(f"   Total: {success_count}/{total_count} analyses completed")
    
    if success_count == total_count:
        print("\n🎉 ALL ANALYSES COMPLETED SUCCESSFULLY!")
    else:
        print("\n⚠️ Some analyses had issues. Check logs above.")
    
    print("=" * 70)
    print(f"  Scan finished at {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
    print("=" * 70)

if __name__ == "__main__":
    main()